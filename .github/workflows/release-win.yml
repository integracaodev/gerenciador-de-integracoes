name: Build (Windows) + Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*" # ex: v1.0.0

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (npm run pack)
        run: npm run pack

      - name: Build (npm run pack:ws2012)
        run: npm run pack:ws2012

      - name: Zip dist folders
        shell: pwsh
        run: |
          if (!(Test-Path "dist")) { throw "Pasta dist/ não encontrada." }
          if (!(Test-Path "dist-ws2012")) { throw "Pasta dist-ws2012/ não encontrada." }

          # Se disparado por tag, use a própria tag. Se manual, crie uma tag "manual-<run_number>"
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "manual-${{ github.run_number }}"
          }

          $zipNameA = "RochaSystem-Central-de-Apps-$tag-win32-x64.zip"
          $zipNameB = "RochaSystem-Central-de-Apps-$tag-win32-x64-ws2012.zip"

          if (Test-Path $zipNameA) { Remove-Item $zipNameA -Force }
          if (Test-Path $zipNameB) { Remove-Item $zipNameB -Force }
          Compress-Archive -Path "dist\*" -DestinationPath $zipNameA -Force
          Compress-Archive -Path "dist-ws2012\*" -DestinationPath $zipNameB -Force

          "ZIP_NAME=$zipNameA"        | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZIP_NAME_WS2012=$zipNameB" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAG_NAME=$tag"             | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create/Update GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME_WS2012 }}
